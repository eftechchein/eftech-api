<!DOCTYPE html>
<html>
<head>
  <title>EFTech Admin</title>
</head>

<body style="background:#111;color:white;font-family:Arial;padding:20px;">

<h1>EFTech Admin</h1>

<h2>Agregar canal</h2>

<input id="name" placeholder="Nombre">
<input id="category" placeholder="Categoría">
<input id="logo" placeholder="Logo URL">
<input id="stream" placeholder="Stream URL">

<button onclick="addChannel()">
Agregar
</button>

<hr>

<h2>Canales</h2>

<div id="channels"></div>

<script>

const API =
"https://eftech-api.onrender.com";

async function loadChannels() {

  const res =
    await fetch(API + "/api/channels");

  const channels =
    await res.json();

  const container =
    document.getElementById("channels");

  container.innerHTML = "";

  channels.forEach(channel => {

    container.innerHTML += `
      <div style="
        border:1px solid #333;
        padding:10px;
        margin-bottom:10px;
      ">

        <b>${channel.name}</b>
        <br>

        ${channel.category}

        <br><br>

        <button onclick="deleteChannel(${channel.id})">
          Borrar
        </button>

      </div>
    `;
  });
}

async function addChannel() {

  await fetch(API + "/api/add-channel", {

    method: "POST",

    headers: {
      "Content-Type": "application/json"
    },

    body: JSON.stringify({

      name:
        document.getElementById("name").value,

      category:
        document.getElementById("category").value,

      logo:
        document.getElementById("logo").value,

      stream_url:
        document.getElementById("stream").value
    })
  });

  loadChannels();
}

async function deleteChannel(id) {

  await fetch(
    API + "/api/channel/" + id,
    {
      method: "DELETE"
    }
  );

  loadChannels();
}

loadChannels();

</script>

</body>
</html>
